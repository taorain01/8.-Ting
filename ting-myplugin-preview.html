<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ting + MyPlugin Preview</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --panel-soft: #f0f4f8;
            --sidebar: #1e1b3a;
            --sidebar-2: #28224f;
            --text: #172033;
            --muted: #667085;
            --faint: #98a2b3;
            --line: #dbe3ef;
            --accent: #6c5ce7;
            --accent-soft: #eeeafe;
            --teal: #10b981;
            --teal-soft: #dcfce7;
            --amber: #f59e0b;
            --amber-soft: #fff7ed;
            --rose: #e11d48;
            --rose-soft: #ffe4e6;
            --blue: #2563eb;
            --blue-soft: #dbeafe;
            --shadow: 0 12px 30px rgba(24, 36, 58, 0.08);
            --radius: 8px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        button, input { font: inherit; }
        button { border: 0; background: none; cursor: pointer; color: inherit; }

        .app {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 4px 0 24px rgba(15, 23, 42, 0.18);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .brand img {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            object-fit: cover;
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
        }

        .brand-title strong { font-size: 17px; }
        .brand-title span { color: rgba(255,255,255,0.58); font-size: 12px; }

        .sidebar-actions {
            display: grid;
            gap: 8px;
            padding: 16px 18px 10px;
        }

        .primary-btn,
        .secondary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 38px;
            padding: 9px 12px;
            border-radius: var(--radius);
            font-weight: 750;
            font-size: 13px;
        }

        .primary-btn {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 8px 18px rgba(108, 92, 231, 0.28);
        }

        .secondary-btn {
            border: 1px solid rgba(255,255,255,0.16);
            color: rgba(255,255,255,0.88);
            background: rgba(255,255,255,0.06);
        }

        .nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 16px;
        }

        .nav-group { margin-top: 10px; }
        .nav-label {
            padding: 9px 10px 7px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.36);
        }

        .nav-item {
            width: 100%;
            display: grid;
            grid-template-columns: 20px minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            min-height: 40px;
            padding: 9px 10px;
            border-radius: var(--radius);
            color: rgba(255,255,255,0.68);
            text-align: left;
            transition: background .16s ease, color .16s ease;
        }

        .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-item.active {
            background: rgba(108, 92, 231, 0.20);
            color: #fff;
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .nav-item svg,
        .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .badge {
            min-width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 7px;
            color: #fff;
            background: rgba(255,255,255,0.14);
            font-size: 11px;
            font-weight: 800;
        }

        .sidebar-footer {
            padding: 12px 18px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.42);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .main { min-width: 0; display: flex; flex-direction: column; }

        .topbar {
            min-height: 68px;
            display: grid;
            grid-template-columns: minmax(180px, 280px) minmax(220px, 620px) auto;
            align-items: center;
            gap: 18px;
            padding: 12px 28px;
            border-bottom: 1px solid var(--line);
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .page-title {
            margin: 0;
            font-size: 22px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 42px;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            border-radius: 999px;
            padding: 0 14px;
        }

        .search input {
            min-width: 0;
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
        }

        .top-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: var(--radius);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--muted);
        }

        .user {
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 1px solid var(--line);
            padding-left: 12px;
        }

        .user-copy { text-align: right; line-height: 1.2; }
        .user-copy strong { display: block; font-size: 13px; }
        .user-copy span { color: var(--muted); font-size: 11px; }
        .avatar {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 900;
        }

        .content {
            padding: 26px 28px 32px;
            overflow: auto;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .domain-panel,
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .domain-panel { overflow: hidden; }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title strong { font-size: 16px; }
        .panel-title span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }

        .domain-mark {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: var(--radius);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .domain-mark.plugin { color: var(--teal); background: var(--teal-soft); }

        .panel-body { padding: 16px 18px 18px; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .stat {
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--panel-soft);
            min-height: 86px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat strong {
            font-size: 28px;
            letter-spacing: 0;
            line-height: 1;
        }

        .stat span { color: var(--muted); font-size: 13px; font-weight: 650; }
        .stat.warning { background: var(--amber-soft); border-color: #fed7aa; }
        .stat.good { background: var(--teal-soft); border-color: #bbf7d0; }
        .stat.danger { background: var(--rose-soft); border-color: #fecdd3; }
        .stat.blue { background: var(--blue-soft); border-color: #bfdbfe; }

        .section-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 24px 0 14px;
        }

        .section-row h2 {
            margin: 0;
            font-size: 17px;
            letter-spacing: 0;
        }

        .muted { color: var(--muted); font-size: 13px; }

        .account-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .account-card {
            min-height: 128px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
        }

        .row { display: flex; align-items: center; gap: 10px; min-width: 0; }

        .logo {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: var(--radius);
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 900;
            flex: 0 0 auto;
        }

        .logo.spotify { background: var(--teal-soft); color: var(--teal); }
        .logo.canva { background: var(--blue-soft); color: var(--blue); }
        .logo.plugin { background: #e0f2fe; color: #0284c7; }
        .logo.effect { background: #fae8ff; color: #a21caf; }
        .logo.library { background: var(--amber-soft); color: var(--amber); }

        .card-title { min-width: 0; }
        .card-title strong {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 14px;
        }
        .card-title span {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }
        .chip.good { background: var(--teal-soft); color: #047857; }
        .chip.warn { background: var(--amber-soft); color: #b45309; }
        .chip.danger { background: var(--rose-soft); color: #be123c; }
        .chip.blue { background: var(--blue-soft); color: #1d4ed8; }
        .chip.accent { background: var(--accent-soft); color: var(--accent); }

        .plugin-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .filter-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter {
            min-height: 32px;
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }
        .filter.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        .plugin-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .plugin-card {
            min-height: 238px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .plugin-cover {
            height: 92px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(135deg, rgba(108,92,231,.14), rgba(16,185,129,.14)),
                var(--panel-soft);
            border-bottom: 1px solid var(--line);
            position: relative;
        }

        .plugin-cover .icon {
            width: 38px;
            height: 38px;
            color: var(--accent);
        }

        .license {
            position: absolute;
            top: 10px;
            right: 10px;
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.92);
            color: var(--text);
            font-size: 11px;
            font-weight: 850;
            border: 1px solid rgba(219,227,239,0.9);
        }

        .plugin-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .plugin-meta {
            color: var(--muted);
            font-size: 12px;
            min-height: 16px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .empty {
            border: 1px dashed var(--line);
            background: var(--panel);
            border-radius: var(--radius);
            padding: 34px;
            text-align: center;
            color: var(--muted);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .settings-card {
            padding: 16px;
            min-height: 150px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
            gap: 12px;
        }
        .toggle-row:last-child { border-bottom: 0; }
        .toggle-row span { color: var(--muted); font-size: 12px; }
        .toggle {
            width: 42px;
            height: 24px;
            border-radius: 999px;
            background: var(--accent);
            position: relative;
            flex: 0 0 auto;
        }
        .toggle::after {
            content: "";
            position: absolute;
            top: 3px;
            right: 3px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 999px;
        }

        @media (max-width: 1180px) {
            .overview-grid { grid-template-columns: 1fr; }
            .plugin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .account-list { grid-template-columns: 1fr; }
            .settings-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 820px) {
            .app { grid-template-columns: 76px minmax(0, 1fr); }
            .brand-title, .nav-label, .nav-item span:not(.badge), .sidebar-actions, .sidebar-footer { display: none; }
            .brand { justify-content: center; padding: 18px 10px; }
            .nav-item { grid-template-columns: 1fr; justify-items: center; padding: 10px 6px; }
            .badge { display: none; }
            .topbar {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 10px;
                padding: 14px 16px;
            }
            .top-actions { justify-content: space-between; }
            .content { padding: 18px 16px 24px; }
            .stat-grid, .plugin-grid { grid-template-columns: 1fr; }
            .user-copy { display: none; }
        }
    </style>
</head>

    <script>
        const pages = {
            dashboard: { title: 'T&#7893;ng quan', domain: 'account' },
            'accounts-bought': { title: 'TK Mua', domain: 'account' },
            'accounts-personal': { title: 'C&aacute; nh&acirc;n', domain: 'account' },
            categories: { title: 'Danh m&#7909;c', domain: 'account' },
            'plugin-dashboard': { title: 'T&#7893;ng quan Plugin', domain: 'plugin' },
            'plugin-all': { title: 'T&#7845;t c&#7843; Plugin', domain: 'plugin' },
            'plugin-vst-instrument': { title: 'VST Instrument', domain: 'plugin', filter: 'VST Instrument' },
            'plugin-vst-effect': { title: 'VST Effect', domain: 'plugin', filter: 'VST Effect' },
            'plugin-library': { title: 'Library/Samples', domain: 'plugin', filter: 'Library / Samples' },
            settings: { title: 'C&agrave;i &#273;&#7863;t', domain: 'settings' }
        };

        const plugins = [
            { name: 'Serum', developer: 'Xfer Records', category: 'VST Instrument', license: 'Licensed', tags: ['EDM', 'Wavetable', 'Bass'], icon: 'instrument' },
            { name: 'FabFilter Pro-Q 3', developer: 'FabFilter', category: 'VST Effect', license: 'Licensed', tags: ['EQ', 'Mixing'], icon: 'effect' },
            { name: 'Nexus 4', developer: 'reFX', category: 'Library / Samples', license: 'Subscription', tags: ['Preset', 'ROMpler'], icon: 'library' },
            { name: 'Ozone 11', developer: 'iZotope', category: 'Mixing / Mastering', license: 'Licensed', tags: ['Mastering', 'AI'], icon: 'effect' }
        ];

        const pluginIcon = '<svg class="icon" viewBox="0 0 24 24"><path d="M2 13a2 2 0 0 0 4 0V7a2 2 0 0 1 4 0v10a2 2 0 0 0 4 0V5a2 2 0 0 1 4 0v14a2 2 0 0 0 4 0v-6"/></svg>';
        const instrumentIcon = '<svg class="icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
        const effectIcon = '<svg class="icon" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></svg>';
        const libraryIcon = '<svg class="icon" viewBox="0 0 24 24"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.7-.9L9.6 3.9A2 2 0 0 0 7.9 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>';

        function iconFor(plugin) {
            if (plugin.icon === 'instrument') return instrumentIcon;
            if (plugin.icon === 'effect') return effectIcon;
            if (plugin.icon === 'library') return libraryIcon;
            return pluginIcon;
        }

        function renderPluginCard(plugin) {
            const logoClass = plugin.icon === 'effect' ? 'effect' : plugin.icon === 'library' ? 'library' : 'plugin';
            return `
                <article class="card plugin-card">
                    <div class="plugin-cover">
                        ${iconFor(plugin)}
                        <span class="license">${plugin.license}</span>
                    </div>
                    <div class="plugin-body">
                        <div class="row">
                            <div class="logo ${logoClass}">${plugin.name.slice(0, 1)}</div>
                            <div class="card-title">
                                <strong>${plugin.name}</strong>
                                <span>${plugin.developer}</span>
                            </div>
                        </div>
                        <div class="plugin-meta">${plugin.category}</div>
                        <div class="chips">
                            ${plugin.tags.map((tag, index) => `<span class="chip ${index === 0 ? 'accent' : ''}">${tag}</span>`).join('')}
                        </div>
                    </div>
                </article>
            `;
        }

        function renderPlugins(filter) {
            const list = filter ? plugins.filter(plugin => plugin.category === filter) : plugins;
            if (!list.length) return '<div class="empty">Ch&#432;a c&oacute; plugin trong nh&oacute;m n&agrave;y.</div>';
            return list.map(renderPluginCard).join('');
        }

        function renderPluginPage(meta) {
            return `
                <div class="plugin-toolbar">
                    <div class="filter-row">
                        <button class="filter active" type="button">T&#7845;t c&#7843;</button>
                        <button class="filter" type="button">Licensed</button>
                        <button class="filter" type="button">Free</button>
                        <button class="filter" type="button">C&#7847;n qu&eacute;t</button>
                    </div>
                    <button class="primary-btn" type="button">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        Th&ecirc;m Plugin
                    </button>
                </div>
                <div class="overview-grid" style="margin-bottom:18px">
                    <section class="domain-panel">
                        <div class="panel-head">
                            <div class="panel-title">
                                <div class="domain-mark plugin">${pluginIcon}</div>
                                <div><strong>${meta.title}</strong><span>Qu&#7843;n l&yacute; plugin trong c&ugrave;ng Ting shell</span></div>
                            </div>
                            <span class="chip good">${meta.filter ? 'Filtered' : '42 plugin'}</span>
                        </div>
                        <div class="panel-body">
                            <div class="stat-grid">
                                <div class="stat"><strong>${meta.filter ? renderCount(meta.filter) : 42}</strong><span>Plugin</span></div>
                                <div class="stat good"><strong>28</strong><span>Licensed</span></div>
                                <div class="stat blue"><strong>9</strong><span>Free</span></div>
                                <div class="stat warning"><strong>5</strong><span>C&#7847;n qu&eacute;t l&#7841;i</span></div>
                            </div>
                        </div>
                    </section>
                    <section class="domain-panel">
                        <div class="panel-head">
                            <div class="panel-title">
                                <div class="domain-mark">
                                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2M20 14h2M9 13v2M15 13v2"/></svg>
                                </div>
                                <div><strong>AI Summary</strong><span>Provider v&agrave; model n&#7857;m trong Settings</span></div>
                            </div>
                            <span class="chip accent">Gemini</span>
                        </div>
                        <div class="panel-body">
                            <div class="account-card card" style="box-shadow:none">
                                <div class="row">
                                    <div class="logo plugin">A</div>
                                    <div class="card-title"><strong>Preset &amp; ghi ch&uacute;</strong><span>Gom trong detail plugin</span></div>
                                </div>
                                <div class="chips"><span class="chip good">Ready</span><span class="chip">Local API key</span></div>
                            </div>
                        </div>
                    </section>
                </div>
                <div class="plugin-grid">${renderPlugins(meta.filter)}</div>
            `;
        }

        function renderCount(filter) {
            return plugins.filter(plugin => plugin.category === filter).length;
        }

        function renderAccountPage(meta) {
            return `
                <div class="section-row" style="margin-top:0">
                    <h2>${meta.title}</h2>
                    <span class="muted">Mock data Ting</span>
                </div>
                <div class="account-list">
                    <article class="card account-card">
                        <div class="row"><div class="logo">G</div><div class="card-title"><strong>ChatGPT Plus</strong><span>ai******@gmail.com</span></div></div>
                        <div class="chips"><span class="chip warn">C&ograve;n 3 ng&agrave;y</span><span class="chip accent">AI</span></div>
                    </article>
                    <article class="card account-card">
                        <div class="row"><div class="logo spotify">S</div><div class="card-title"><strong>Spotify Premium</strong><span>mu******@gmail.com</span></div></div>
                        <div class="chips"><span class="chip good">Active</span><span class="chip">Duo</span></div>
                    </article>
                    <article class="card account-card">
                        <div class="row"><div class="logo canva">C</div><div class="card-title"><strong>Canva Pro</strong><span>de******@gmail.com</span></div></div>
                        <div class="chips"><span class="chip danger">H&#7871;t h&#7841;n</span><span class="chip">Team</span></div>
                    </article>
                </div>
            `;
        }

        function renderSettings() {
            return `
                <div class="settings-grid">
                    <section class="card settings-card">
                        <div class="panel-title"><div class="domain-mark"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div><strong>B&#7843;o m&#7853;t Ting</strong><span>Master Password</span></div></div>
                        <div class="toggle-row"><div><strong>Auto lock</strong><span>5 ph&uacute;t</span></div><div class="toggle"></div></div>
                    </section>
                    <section class="card settings-card">
                        <div class="panel-title"><div class="domain-mark plugin">${pluginIcon}</div><div><strong>Plugin &amp; AI</strong><span>Gemini/OpenAI</span></div></div>
                        <div class="toggle-row"><div><strong>AI Summary</strong><span>L&#432;u key local</span></div><div class="toggle"></div></div>
                    </section>
                    <section class="card settings-card">
                        <div class="panel-title"><div class="domain-mark"><svg class="icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div><div><strong>Desktop</strong><span>Tray, shortcut, scanner</span></div></div>
                        <div class="toggle-row"><div><strong>Qu&eacute;t plugin</strong><span>Electron API</span></div><div class="toggle"></div></div>
                    </section>
                </div>
            `;
        }

        function renderDashboard() {
            const template = document.getElementById('tpl-dashboard');
            const fragment = template.content.cloneNode(true);
            const wrap = document.createElement('div');
            wrap.appendChild(fragment);
            wrap.querySelector('[data-plugin-grid]').innerHTML = renderPlugins();
            return wrap.innerHTML;
        }

        function decodeHtml(value) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = value;
            return textarea.value;
        }

        function setPage(page) {
            const meta = pages[page] || pages.dashboard;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.page === page));
            document.getElementById('page-title').innerHTML = meta.title;
            document.getElementById('search-input').placeholder = decodeHtml(meta.domain === 'plugin'
                ? 'T&igrave;m plugin...'
                : meta.domain === 'settings'
                    ? 'T&igrave;m c&agrave;i &#273;&#7863;t...'
                    : 'T&igrave;m t&agrave;i kho&#7843;n...');

            const content = document.getElementById('content');
            if (page === 'dashboard') content.innerHTML = renderDashboard();
            else if (meta.domain === 'plugin') content.innerHTML = renderPluginPage(meta);
            else if (page === 'settings') content.innerHTML = renderSettings();
            else content.innerHTML = renderAccountPage(meta);
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => setPage(item.dataset.page));
        });

        document.querySelector('[data-action="plugin"]').addEventListener('click', () => setPage('plugin-dashboard'));
        document.querySelector('[data-action="account"]').addEventListener('click', () => setPage('accounts-bought'));

        setPage('dashboard');
    </script>
