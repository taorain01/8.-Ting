# Publish_Workflow — Bước phát hành Android + ghi Release_Manifest (Task 12.2)
#
# Build APK, tính APK_Checksum (SHA-256) + kích thước file, sinh `version.json`
# (Release_Manifest với đủ 7 trường), rồi upload APK + `version.json` lên
# Releases_Repository công khai (taorain01/ting-releases).
#
# Yêu cầu: 8.2 (upload APK + cập nhật Release_Manifest), 8.3 (tính APK_Checksum
# + kích thước rồi ghi vào manifest), 8.4 (đặt latestVersion, versionCode,
# releaseNotes, apkUrl, minSupportedVersion).
#
# Bảo mật: KHÔNG hardcode token. Token lấy từ secret `GH_TOKEN` (cần quyền ghi
# tới Releases_Repository). App phân phối KHÔNG chứa token — token chỉ tồn tại
# trong môi trường CI này.

name: Publish Android

on:
  # Phát hành khi đẩy tag phiên bản (ví dụ v1.4.0).
  push:
    tags:
      - "v*"
  # Cho phép chạy thủ công, cho phép nhập version code / min supported.
  workflow_dispatch:
    inputs:
      version:
        description: "latestVersion (semantic, ví dụ 1.4.0). Bỏ trống để lấy từ build.gradle."
        required: false
        default: ""
      versionCode:
        description: "versionCode (số). Bỏ trống để lấy từ build.gradle."
        required: false
        default: ""
      minSupportedVersion:
        description: "minSupportedVersion (versionCode thấp nhất được hỗ trợ)."
        required: false
        default: "1"
      releaseNotes:
        description: "Ghi chú phát hành (tiếng Việt)."
        required: false
        default: ""

permissions:
  contents: read

env:
  # Releases_Repository công khai — nơi chứa APK + version.json.
  RELEASES_REPO: taorain01/ting-releases

jobs:
  publish-android:
    name: Build APK & write Release_Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Thiết lập JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Thiết lập Android SDK
        uses: android-actions/setup-android@v3

      - name: Cài đặt dependencies
        run: npm ci

      # Xác định phiên bản: ưu tiên input (workflow_dispatch) hoặc tag (push),
      # còn lại để script write-release-manifest.cjs đọc từ build.gradle.
      - name: Xác định phiên bản phát hành
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)"
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "assetName=Ting-${VERSION}.apk" >> "$GITHUB_OUTPUT"
          echo "Phiên bản phát hành: ${VERSION} (tag ${TAG})"

      # Build APK debug qua script chung. android-actions/setup-android đã đặt
      # ANDROID_HOME; actions/setup-java đã đặt JAVA_HOME (JDK 21).
      - name: Build APK
        run: npm run android:build:debug

      # Đưa APK về output/ với tên asset ổn định để khớp apkUrl trong manifest.
      # GUARD artifact thiếu (Yêu cầu 8.5): nếu APK build không tồn tại → DỪNG
      # ngay, KHÔNG sửa version.json, báo cáo artifact bị thiếu qua ::error::.
      - name: Chuẩn bị artifact APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="output/${{ steps.version.outputs.assetName }}"
          if [ ! -f "$SRC" ]; then
            echo "::error title=Artifact thiếu (Yêu cầu 8.5)::Không tìm thấy APK build tại $SRC. Dừng phát hành, KHÔNG sửa version.json."
            exit 1
          fi
          cp "$SRC" "$DEST"
          if [ ! -f "$DEST" ]; then
            echo "::error title=Artifact thiếu (Yêu cầu 8.5)::Sao chép APK thất bại, không có artifact tại $DEST. Dừng phát hành, KHÔNG sửa version.json."
            exit 1
          fi
          echo "apkPath=${DEST}" >> "$GITHUB_OUTPUT"

      # GUARD artifact thiếu tường minh ngay trước khi ghi manifest (Yêu cầu 8.5).
      # Lớp phòng thủ thứ hai, độc lập với bước copy phía trên: đảm bảo dù các
      # bước có bị đổi thứ tự/bỏ qua thì manifest vẫn KHÔNG được ghi khi thiếu APK.
      - name: Guard artifact trước khi ghi manifest
        shell: bash
        run: |
          set -euo pipefail
          APK="${{ steps.apk.outputs.apkPath }}"
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "::error title=Artifact thiếu (Yêu cầu 8.5)::Thiếu artifact APK cần thiết ('$APK'). Dừng phát hành, KHÔNG sửa version.json."
            exit 1
          fi
          echo "Artifact APK sẵn sàng: $APK"

      # Ghi version.json (tính SHA-256 + kích thước bên trong script chung).
      # Guard lớp cuối nằm trong chính script: nếu APK thiếu, script ném
      # MissingArtifactError, thoát mã 2 và KHÔNG ghi version.json (Yêu cầu 8.5).
      - name: Ghi Release_Manifest (version.json)
        run: >-
          node scripts/write-release-manifest.cjs
          --apk "${{ steps.apk.outputs.apkPath }}"
          --out output/version.json
          --version "${{ steps.version.outputs.version }}"
          ${{ github.event.inputs.versionCode && format('--version-code {0}', github.event.inputs.versionCode) || '' }}
          --min-supported "${{ github.event.inputs.minSupportedVersion || '1' }}"
          --releases-repo "${{ env.RELEASES_REPO }}"
          --tag "${{ steps.version.outputs.tag }}"
          --asset-name "${{ steps.version.outputs.assetName }}"
          --notes "${{ github.event.inputs.releaseNotes }}"

      # Upload APK + version.json lên Releases_Repository công khai. Tạo release
      # nếu chưa có (idempotent), rồi upload/ghi đè asset. Dùng GH_TOKEN từ secret.
      - name: Upload APK + version.json lên Releases_Repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ env.RELEASES_REPO }}"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" \
              --title "Ting! ${{ steps.version.outputs.version }}" \
              --notes "Bản phát hành Android ${{ steps.version.outputs.version }}"
          fi
          gh release upload "$TAG" \
            "${{ steps.apk.outputs.apkPath }}" \
            "output/version.json" \
            --repo "$REPO" --clobber

      # Lưu artifact của lần chạy để chẩn đoán (không thay cho publish).
      - name: Lưu artifact build (chẩn đoán)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            output/*.apk
            output/version.json
          if-no-files-found: warn
          retention-days: 7
