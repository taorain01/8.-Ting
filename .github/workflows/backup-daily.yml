name: Daily Firestore Backup

# Sao lưu toàn bộ Firestore mỗi ngày → gửi lên Discord webhook (đã mã hoá).
# Secrets cần đặt trong repo Settings → Secrets and variables → Actions:
#   - DISCORD_WEBHOOK_URL
#   - BACKUP_KEY
#   - FIREBASE_SERVICE_ACCOUNT  (dán NGUYÊN nội dung file service account .json)

on:
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 02:00 giờ Việt Nam (UTC+7)
  workflow_dispatch: {}      # cho phép bấm chạy tay

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Script chỉ cần firebase-admin. Cài trong thư mục TẠM biệt lập để KHÔNG đụng
      # tới package.json của cả dự án (tránh xung đột peer-deps của electron/capacitor).
      - name: Cài firebase-admin (biệt lập)
        run: |
          mkdir -p "$RUNNER_TEMP/backup-deps"
          cd "$RUNNER_TEMP/backup-deps"
          npm init -y >/dev/null 2>&1
          npm install firebase-admin@^14.1.0 --no-audit --no-fund

      - name: Chạy backup
        env:
          NODE_PATH: ${{ runner.temp }}/backup-deps/node_modules
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BACKUP_KEY: ${{ secrets.BACKUP_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/backup-to-discord.cjs
