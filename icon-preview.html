<!DOCTYPE html>

<meta charset="UTF-8">

<title>Ting! — Icon Preview & Picker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f13;color:#e0e0e8;padding:24px}
h1{text-align:center;font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#6C5CE7,#A29BFE);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:14px}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.controls input{background:#1a1a24;border:1px solid #333;border-radius:8px;padding:10px 16px;color:#fff;font-size:14px;width:320px;outline:none}
.controls input:focus{border-color:#6C5CE7}
.controls button{background:#6C5CE7;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600}
.controls button:hover{background:#5a4bd6}
.stats{text-align:center;color:#666;font-size:13px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:16px;transition:all .2s}
.card:hover{border-color:#6C5CE7;transform:translateY(-2px)}
.card.fallback{border-color:#f5a62350}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.card-header .label{font-weight:700;font-size:15px}
.card-header .key{color:#888;font-size:12px}
.icon-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.icon-box{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;position:relative;transition:all .15s}
.icon-box:hover{border-color:#6C5CE7;transform:scale(1.1)}
.icon-box.selected{border-color:#1DB954;box-shadow:0 0 12px #1DB95440}
.icon-box img{width:28px;height:28px}
.icon-box .src-tag{position:absolute;bottom:-4px;right:-4px;font-size:8px;background:#333;color:#aaa;padding:1px 4px;border-radius:4px;pointer-events:none}
.icon-box.local{background:#1e1e2e}
.icon-box.cdn{background:#0d1b2a}
.icon-box.cdn-alt{background:#1a0d2e}
.color-dot{width:14px;height:14px;border-radius:50%;border:1px solid #444;flex-shrink:0}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.badge.ok{background:#1DB95420;color:#1DB954}
.badge.fb{background:#f5a62320;color:#f5a623}
.badge.miss{background:#e5393520;color:#e53935}
.badge.new{background:#6C5CE720;color:#A29BFE}
.section-title{font-size:20px;font-weight:700;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid #2a2a3a}
#status{position:fixed;bottom:20px;right:20px;background:#1DB954;color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;display:none;z-index:99}
.hidden{display:none!important}
</style>
</head>

<div id="content"></div>

const selected = {};
let loadedCards = {};

async function checkUrl(url) {
  try {
    const r = await fetch(url, { method: 'HEAD', mode: 'cors' });
    return r.ok;
  } catch { return false; }
}

async function loadSvgContent(url) {
  try {
    const r = await fetch(url, { mode: 'cors' });
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

function createIconBox(src, tag, type, key) {
  const box = document.createElement('div');
  box.className = `icon-box ${type}`;
  box.title = `${tag} (${type})`;
  box.dataset.key = key;
  box.dataset.src = src;
  box.dataset.tag = tag;
  
  const img = document.createElement('img');
  img.src = src;
  img.alt = tag;
  img.onerror = () => { box.style.display = 'none'; };
  box.appendChild(img);
  
  const srcTag = document.createElement('span');
  srcTag.className = 'src-tag';
  srcTag.textContent = tag;
  box.appendChild(srcTag);
  
  box.onclick = () => {
    // Deselect others for same platform
    const card = box.closest('.card');
    card.querySelectorAll('.icon-box').forEach(b => b.classList.remove('selected'));
    box.classList.add('selected');
    selected[key] = { src, tag, type };
    updateStats();
  };
  
  return box;
}

async function buildCard(key, config) {
  const card = document.createElement('div');
  card.className = `card ${config.isNew ? '' : ''}`;
  card.dataset.key = key;
  card.dataset.label = config.label.toLowerCase();
  
  const header = document.createElement('div');
  header.className = 'card-header';
  
  const dot = document.createElement('span');
  dot.className = 'color-dot';
  dot.style.background = config.color;
  header.appendChild(dot);
  
  const labelEl = document.createElement('span');
  labelEl.className = 'label';
  labelEl.textContent = config.label;
  header.appendChild(labelEl);
  
  const keyEl = document.createElement('span');
  keyEl.className = 'key';
  keyEl.textContent = key;
  header.appendChild(keyEl);
  
  // Badge
  const badge = document.createElement('span');
  if (config.isNew) {
    badge.className = 'badge new';
    badge.textContent = 'MỚI';
  }
  header.appendChild(badge);
  
  card.appendChild(header);
  
  const iconRow = document.createElement('div');
  iconRow.className = 'icon-row';
  
  // 1. Local SVG
  const localFile = config.file || `${key}.svg`;
  const localUrl = LOCAL_BASE + localFile;
  if (!config.isNew) {
    iconRow.appendChild(createIconBox(localUrl, 'local', 'local', key));
  }
  
  // 2. CDN current slug
  const cdnUrl = SI_CDN + config.si + '.svg';
  iconRow.appendChild(createIconBox(cdnUrl, config.si, 'cdn', key));
  
  // 3. Alternative CDN slugs
  const alts = ALT_SLUGS[key] || [];
  for (const alt of alts) {
    if (alt !== config.si) {
      iconRow.appendChild(createIconBox(SI_CDN + alt + '.svg', alt, 'cdn-alt', key));
    }
  }
  
  card.appendChild(iconRow);
  return card;
}

function updateStats() {
  const total = Object.keys(PLATFORMS).length;
  const selectedCount = Object.keys(selected).length;
  const newCount = Object.values(PLATFORMS).filter(p => p.isNew).length;
  document.getElementById('stats').textContent = 
    `${total} nền tảng (${total - newCount} hiện tại + ${newCount} mới) · ${selectedCount} đã chọn`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const match = card.dataset.key.includes(q) || card.dataset.label.includes(q);
    card.classList.toggle('hidden', !match);
  });
}

function selectAllCDN() {
  document.querySelectorAll('.card').forEach(card => {
    const cdnBox = card.querySelector('.icon-box.cdn');
    if (cdnBox && cdnBox.style.display !== 'none') cdnBox.click();
  });
}

async function downloadSelected() {
  const entries = Object.entries(selected);
  if (!entries.length) { alert('Chưa chọn icon nào!'); return; }
  
  const status = document.getElementById('status');
  status.style.display = 'block';
  
  let done = 0;
  for (const [key, info] of entries) {
    status.textContent = `Đang tải ${done + 1}/${entries.length}: ${key}...`;
    try {
      const svg = await loadSvgContent(info.src);
      if (svg) {
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const a = document.createElement('a');
        const file = PLATFORMS[key]?.file || `${key}.svg`;
        a.href = URL.createObjectURL(blob);
        a.download = file;
        a.click();
        URL.revokeObjectURL(a.href);
        await new Promise(r => setTimeout(r, 300));
      }
    } catch (e) { console.warn(`Lỗi tải ${key}:`, e); }
    done++;
  }
  
  status.textContent = `✅ Đã tải ${done} icon!`;
  setTimeout(() => { status.style.display = 'none'; }, 3000);
}

    '📧 Email & Privacy': ['proton','protonmail'],
    '📚 Education': ['coursera','udemy','duolingo'],
    '📋 Project Management': ['linear','asana','airtable','miro','jira'],
    '🗄️ Database & Backend': ['firebase','googlecloud','mongodb','supabase','aws'],
    '🎮 Gaming': ['steam','epicgames','roblox'],
    '💬 Vietnam': ['zalo'],
  };
  
  for (const [catName, keys] of Object.entries(categories)) {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = catName;
    content.appendChild(title);
    
    const grid = document.createElement('div');
    grid.className = 'grid';
    
    for (const key of keys) {
      const config = PLATFORMS[key];
      if (!config) continue;
      const card = await buildCard(key, config);
      grid.appendChild(card);
    }
    
    content.appendChild(grid);
  }
  
  updateStats();
}

init();
